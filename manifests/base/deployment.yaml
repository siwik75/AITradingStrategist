# =============================================================================
# Trading Intelligence Agent — Kubernetes Deployment (base)
# Aligned with Generali Advisor Platform patterns:
# - Dedicated ServiceAccount with IRSA
# - Fargate-compatible (serverless)
# - Resource quotas respected
# - Vault integration for secrets
# - Structured logging to stdout (FluentBit → CloudWatch)
# Environment-specific values (namespace, image tag, account IDs) are set
# in overlays — not via shell variable substitution.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-intelligence-agent
  labels:
    app: trading-intelligence-agent
    tier: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading-intelligence-agent
  template:
    metadata:
      labels:
        app: trading-intelligence-agent
        tier: agent
      annotations:
        # HashiCorp Vault — secret injection via Vault Agent sidecar.
        # The template writes "export LLM_API_KEY=..." to /vault/secrets/llm.
        # The entrypoint must source that file before starting Python.
        # See docs/DEPLOYMENT.md for the entrypoint wrapper pattern.
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "trading-intelligence-agent"
        vault.hashicorp.com/agent-inject-secret-llm: "secret/data/trading-agent/llm"
        vault.hashicorp.com/agent-inject-template-llm: |
          {{- with secret "secret/data/trading-agent/llm" -}}
          export LLM_API_KEY="{{ .Data.data.api_key }}"
          export LLM_GATEWAY_URL="{{ .Data.data.gateway_url }}"
          {{- end }}
    spec:
      serviceAccountName: trading-intelligence-agent-sa
      terminationGracePeriodSeconds: 30  # Disposability: graceful shutdown
      containers:
        - name: agent
          image: trading-intelligence-agent:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: TRADING_AGENT_DATA_DIR
              value: /tmp/trading-agent
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: trading-agent-config
                  key: environment
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: trading-agent-config
                  key: log_level
            - name: LLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: trading-agent-config
                  key: llm_model
            - name: TRADING_SYMBOLS
              valueFrom:
                configMapKeyRef:
                  name: trading-agent-config
                  key: trading_symbols
            - name: DRY_RUN
              valueFrom:
                configMapKeyRef:
                  name: trading-agent-config
                  key: dry_run
            - name: AGENT_ID
              value: "trading-intelligence-agent"
          # Resource limits — respect namespace ResourceQuota
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          # Kubernetes probes — 16-Factor: Healthcheck
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Security context
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
