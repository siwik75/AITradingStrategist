apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: trading-agent-prod

resources:
  - ../../base

images:
  - name: trading-intelligence-agent
    # Replace with your ECR registry and actual image tag before deploying.
    # Example: 123456789012.dkr.ecr.us-east-1.amazonaws.com/trading-intelligence-agent
    newName: 123456789012.dkr.ecr.us-east-1.amazonaws.com/trading-intelligence-agent
    newTag: v1.0.0

patchesStrategicMerge:
  - configmap-patch.yaml
  - serviceaccount-patch.yaml
