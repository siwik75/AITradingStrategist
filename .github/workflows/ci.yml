name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, type-check, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Type check (mypy)
        run: |
          mypy agents/ tools/ memory/ config/ workflows/ main.py \
            --ignore-missing-imports --no-strict-optional

      - name: Test
        run: pytest tests/ -v --tb=short
        env:
          # Tests mock the LLM — no real API key needed
          ANTHROPIC_API_KEY: sk-ant-test-placeholder
          TRADING_AGENT_DATA_DIR: /tmp/trading-agent-ci

  docker-build:
    name: Docker build + smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t trading-intelligence-agent:ci .

      - name: Smoke test — liveness endpoint
        run: |
          docker run -d --name agent-test \
            -e ANTHROPIC_API_KEY=sk-ant-test-placeholder \
            -p 8080:8080 \
            trading-intelligence-agent:ci
          sleep 8
          curl -f http://localhost:8080/health
          docker stop agent-test
